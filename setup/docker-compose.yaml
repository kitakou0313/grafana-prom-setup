version: '3.8'

services:
  # OpenTelemetry Collector - Signal gateway for traces and metrics
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector/otel-collector.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC (from apps)
      - "4318:4318"   # OTLP HTTP (from apps)
      - "8888:8888"   # Collector metrics (scraped by Prometheus)
    volumes:
      - ./otel-collector/otel-collector.yaml:/etc/otel-collector/otel-collector.yaml
    networks:
      - observability
    depends_on:
      - tempo
      - prometheus
    # restart: unless-stopped

  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--enable-feature=exemplar-storage'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /Volumes/isuconvmssd/prometheus-data:/prometheus
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Grafana Tempo - Distributed tracing backend
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    ports:
      - "3200:3200"   # Tempo HTTP (query)
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml
      - /Volumes/isuconvmssd/tempo-data:/var/tempo
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Grafana Pyroscope - Continuous profiling
  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    ports:
      - "4040:4040"
    environment:
      - PYROSCOPE_LOG_LEVEL=info
    volumes:
      - /Volumes/isuconvmssd/pyroscope-data:/var/lib/pyroscope
    networks:
      - observability
    healthcheck:
      # distrolessイメージのためwgetは使えず、同梱のprofilecliで/readyを確認する
      test: ["CMD", "/usr/bin/profilecli", "ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - /Volumes/isuconvmssd/grafana-data:/var/lib/grafana
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      pyroscope:
        condition: service_healthy
    restart: unless-stopped

networks:
  observability:
    driver: bridge

